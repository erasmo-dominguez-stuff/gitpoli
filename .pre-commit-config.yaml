repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml
    args: [ --allow-multiple-documents ]
  - id: check-json
  - id: check-merge-conflict
  - id: check-added-large-files
    args: [ --maxkb=500 ]

- repo: https://github.com/adrienverge/yamllint
  rev: v1.35.1
  hooks:
  - id: yamllint
    args: [ -d, "{extends: relaxed, rules: {line-length: {max: 120}}}" ]

- repo: local
  hooks:
  - id: opa-check
    name: OPA syntax check
    entry: opa check policies/
    language: system
    files: '\.rego$'
    pass_filenames: false

  - id: opa-fmt
    name: OPA format check
    entry: opa fmt --fail policies/
    language: system
    files: '\.rego$'
    pass_filenames: false

  - id: validate-schemas
    name: Validate YAML policy schemas
    entry: ./scripts/validate_schema.sh
    language: script
    files: '\.(yaml|json)$'
    pass_filenames: false
